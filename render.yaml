services:
  - type: web
    name: bisp-dashboard
    env: node
    plan: free
    rootDir: .          # repo root is the bisp_dashboard folder itself
    buildCommand: npm install
    startCommand: node scripts/start.js
    envVars:
      - key: NODE_ENV
        value: production

      # ── JWT (Render auto-generates a strong random value) ──────
      - key: JWT_SECRET
        generateValue: true

      # ── FTP: office server where databases are stored ──────────
      - key: FTP_HOST
        value: ftp.sdpipk.org
      - key: FTP_PORT
        value: "21"
      - key: FTP_REMOTE_DIR
        value: /bisp_dashboard/
      - key: FTP_USER
        sync: false          # set manually in Render dashboard
      - key: FTP_PASS
        sync: false          # set manually in Render dashboard

      # ── SurveyCTO media proxy credentials ──────────────────────
      - key: SURVEYCTO_USER
        sync: false
      - key: SURVEYCTO_PASS
        sync: false
